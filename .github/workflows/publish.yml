name: Publish to npm

on:
  push:
    branches: [main]
    paths: [package.json]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — publishing $CURRENT"
          else
            git show HEAD~1:package.json > /tmp/prev-package.json 2>/dev/null || echo '{"version":"0.0.0"}' > /tmp/prev-package.json
            PREVIOUS=$(node -p "require('/tmp/prev-package.json').version")
            echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"
            if [ "$CURRENT" != "$PREVIOUS" ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Version changed: $PREVIOUS → $CURRENT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "Version unchanged ($CURRENT), skipping publish"
            fi
          fi

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Lint
        if: steps.version.outputs.changed == 'true'
        run: npm run lint

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: npm run build

      - name: Test
        if: steps.version.outputs.changed == 'true'
        run: npm test

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release and tag
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.current }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes
